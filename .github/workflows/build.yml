name: Build TT//SYS

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [rebuild, rss-update, webhook]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser

      - name: Build newspaper
        run: python tools/build_newspaper.py

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Daily build: $(date +%Y-%m-%d)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "date=$(date +%Y-%m-%d)" >> $GITHUB_OUTPUT
          fi

      - name: Notify Discord
        if: steps.commit.outputs.changed == 'true'
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            "https://discord.com/api/webhooks/1506213103891644446/TH4v8H5jjlhO1K_iqzUg10Y3wnp-Aw1AqlFkU5aEnfv2FcaGILXDr83EJFntvTs6NcSS" \
            -d '{
              "username": "TT//SYS",
              "embeds": [{
                "title": "📰 Neue Ausgabe verfügbar",
                "description": "**Truthys Times** — Edition '"'"'$(date +%Y-%m-%d)'"'"'\n\n🔗 [https://deusexlumen.github.io/truthys-times/](https://deusexlumen.github.io/truthys-times/)",
                "color": 16750848,
                "timestamp": "'"'"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"'"'",
                "footer": { "text": "TT//SYS Autonomous Signal Processing" },
                "fields": [
                  { "name": "📡 Status", "value": "`SYSTEM: OPERATIONAL`", "inline": true },
                  { "name": "🤖 Builder", "value": "`Truthseeker v6.4`", "inline": true }
                ]
              }]
            }'
