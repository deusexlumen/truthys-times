name: Build TT//SYS v2.0

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      builder_version:
        description: 'Builder version to run (v2 or v4)'
        required: false
        default: 'v2'
        type: choice
        options:
          - v2
          - v4
  repository_dispatch:
    types: [rebuild, rss-update, webhook]

concurrency:
  group: tt-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser==6.0.11

      - name: Build newspaper (v2.0 Impulse-Driven)
        if: github.event.inputs.builder_version != 'v4'
        run: python tools/build_v2.py

      - name: Build newspaper (v4.0 Legacy — Sectoral)
        if: github.event.inputs.builder_version == 'v4'
        run: python tools/build_newspaper.py

      - name: Commit and push
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily build v2.0: $(date +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord — Success
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          EVENT="${{ github.event_name }}"
          IS_TEST=false
          if [ "$EVENT" = "workflow_dispatch" ]; then
            IS_TEST=true
          fi
          if [ "${{ github.event.action }}" = "rebuild" ]; then
            IS_TEST=true
          fi

          # Detect archetype from generated HTML if possible
          ARCHETYPE="Unknown"
          if [ -f "index.html" ]; then
            ARCHETYPE=$(grep -oP 'Archetyp: \K[^ ·]+' index.html | head -1 || echo "Unknown")
          fi

          if [ "$IS_TEST" = "true" ]; then
            TITLE="🧪 TEST — Truthys Times v2.0 Preview"
            COLOR=3066993
            STATUS="TEST: v2.0 PREVIEW"
            FOOTER="TT//SYS v2.0 Test Signal | Not Production"
          else
            TITLE="📰 Neue Ausgabe verfügbar"
            COLOR=16750848
            STATUS="SYSTEM: v2.0 OPERATIONAL"
            FOOTER="TT//SYS Impulse-Driven Signal Processing"
          fi

          PAYLOAD=$(jq -n \
            --arg date "$(date +%Y-%m-%d)" \
            --arg iso  "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg title "$TITLE" \
            --arg status "$STATUS" \
            --arg footer "$FOOTER" \
            --arg archetype "$ARCHETYPE" \
            --argjson color "$COLOR" \
            '{
              username: "TT//SYS",
              embeds: [{
                title: $title,
                description: "**Truthys Times** — Edition \($date)\nArchetyp: `\($archetype)`\n\n🔗 [https://deusexlumen.github.io/truthys-times/](https://deusexlumen.github.io/truthys-times/)",
                color: $color,
                timestamp: $iso,
                footer: { text: $footer },
                fields: [
                  { name: "📡 Status", value: "`\($status)`", inline: true },
                  { name: "🤖 Builder", value: "`Truthseeker v6.4`", inline: true },
                  { name: "🔶 Archetyp", value: "`\($archetype)`", inline: true }
                ]
              }]
            }')
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/webhooks/1506213103891644446/TH4v8H5jjlhO1K_iqzUg10Y3wnp-Aw1AqlFkU5aEnfv2FcaGILXDr83EJFntvTs6NcSS"

      - name: Notify Discord — Failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg iso "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              username: "TT//SYS",
              embeds: [{
                title: "⚠️ Build-Fehler",
                description: "**Truthys Times v2.0** Build fehlgeschlagen.\n\n🔗 [Actions Log](\($url))",
                color: 15158332,
                timestamp: $iso,
                footer: { text: "TT//SYS v2.0 Impulse-Driven — FAILURE" }
              }]
            }')
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/webhooks/1506213103891644446/TH4v8H5jjlhO1K_iqzUg10Y3wnp-Aw1AqlFkU5aEnfv2FcaGILXDr83EJFntvTs6NcSS"
