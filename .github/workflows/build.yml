name: Build TT//SYS

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [rebuild, rss-update, webhook]

concurrency:
  group: tt-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser==6.0.11

      - name: Build newspaper
        run: python tools/build_newspaper.py

      - name: Commit and push
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily build: $(date +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Discord — Success
        if: steps.commit.outputs.changed == 'true'
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg date "$(date +%Y-%m-%d)" \
            --arg iso  "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            '{
              username: "TT//SYS",
              embeds: [{
                title: "📰 Neue Ausgabe verfügbar",
                description: "**Truthys Times** — Edition \($date)\n\n🔗 [https://deusexlumen.github.io/truthys-times/](https://deusexlumen.github.io/truthys-times/)",
                color: 16750848,
                timestamp: $iso,
                footer: { text: "TT//SYS Autonomous Signal Processing" },
                fields: [
                  { name: "📡 Status", value: "`SYSTEM: OPERATIONAL`", inline: true },
                  { name: "🤖 Builder", value: "`Truthseeker v6.4`", inline: true }
                ]
              }]
            }')
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/webhooks/1506213103891644446/TH4v8H5jjlhO1K_iqzUg10Y3wnp-Aw1AqlFkU5aEnfv2FcaGILXDr83EJFntvTs6NcSS"

      - name: Notify Discord — Failure
        if: failure()
        shell: bash
        run: |
          set -euo pipefail
          PAYLOAD=$(jq -n \
            --arg iso "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg url "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            '{
              username: "TT//SYS",
              embeds: [{
                title: "⚠️ Build-Fehler",
                description: "**Truthys Times** Build fehlgeschlagen.\n\n🔗 [Actions Log](\($url))",
                color: 15158332,
                timestamp: $iso,
                footer: { text: "TT//SYS Autonomous Signal Processing — FAILURE" }
              }]
            }')
          curl -fsS -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "https://discord.com/api/webhooks/1506213103891644446/TH4v8H5jjlhO1K_iqzUg10Y3wnp-Aw1AqlFkU5aEnfv2FcaGILXDr83EJFntvTs6NcSS"
