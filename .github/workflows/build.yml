name: Build TT//SYS v2.0

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      builder_version:
        description: 'Builder version to run (v2 or v4)'
        required: false
        default: 'v2'
        type: choice
        options:
          - v2
          - v4
  repository_dispatch:
    types: [rebuild, rss-update, webhook]

concurrency:
  group: tt-build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install feedparser==6.0.11

      - name: Build newspaper (v2.0 Impulse-Driven)
        if: github.event.inputs.builder_version != 'v4'
        run: python tools/build_v2.py

      - name: Build newspaper (v4.0 Legacy — Sectoral)
        if: github.event.inputs.builder_version == 'v4'
        run: python tools/build_newspaper.py

      - name: Commit and push
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily build v2.0: $(date +%Y-%m-%d)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "date=$(date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      # Discord notifications removed per Prime Node directive 2026-05-26
      # Manual posting via AI message tool replaces webhook

